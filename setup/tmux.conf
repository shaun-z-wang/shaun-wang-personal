# ~/.tmux.conf

# Graham's tmux notes: https://pastry.instacart.tools/xAEI-filling-sifting-catfish/

###########################################################################
# OPTIONAL: Remap prefix from default (Ctrl+b) to Ctrl+a

# tmux requires a "prefix" key before every command. Remapping from the
# default Ctrl+b to Ctrl+a (easier to reach).
unbind C-b
set -g prefix C-a
bind C-a send-prefix

###########################################################################
# General options

# Enable 256 color and true color (16m colors) support. Without this,
# colors in editors like Neovim can look wrong or washed out.
set -g default-terminal "tmux-256color"
set -ga terminal-overrides ",xterm-256color:Tc,xterm-ghostty:Tc"

# Allow tmux to use OSC52 to set the terminal's clipboard
set -g set-clipboard on
# Tell tmux that the outer terminal (the one running tmux) supports clipboard via OSC52
set -sa terminal-features ',xterm-256color:clipboard,xterm-ghostty:clipboard'
# - When you select and copy text in tmux's copy mode, tmux itself emits OSC52
#   escape sequences to your terminal.
# - Assuming your terminal supports it (e.g., iTerm2, ghostty), it receives the
#   OSC52 sequence and writes it to your local macOS clipboard.
# - This works over SSH because OSC52 travels through the SSH connection back
#   to your local terminal. There's no special clipboard protocol involved. It's
#   just terminal output.
# NOTE: before tmux 3.3 there were some issues with this so we need the tmux-yank plugin

# Default session: new clients attach to "current" if it exists
set -g default-command ""
new-session -d -s current 2>/dev/null

# Start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1

# How many lines of output tmux keeps per pane. The default is only 2000.
set -g history-limit 50000

# Allow shortcuts like Ctrl+Left/Right (word jumping) to pass through
# tmux to your shell/editor instead of being swallowed.
set -g xterm-keys on

# Use Vim keybindings in copy mode. E.g. j/k to move, v to start a
# selection, just like in Vim.
set -g mode-keys vi

# Enable mouse support: click to switch/resize panes, scroll with wheel. In
# combination with other settings, also enables mouse selection -> clipboard.
set-option -g mouse on

# Pass bell through to the terminal (for notifications)
set -g visual-bell off
set -g bell-action any

###########################################################################
# General keymap

# Reload this config file with PREFIX+r, without restarting tmux.
unbind c
bind c \
    source-file ~/.tmux.conf \;\
    display 'Reloaded tmux config.'

# New window with prefix+n, rename window with prefix+r
bind n new-window
bind r command-prompt -I "#W" "rename-window '%%'"

# Archive current window to "archive" session (creates it if needed)
bind a if-shell "tmux has-session -t archive 2>/dev/null" "" "new-session -d -s archive" \; move-window -t archive:

# Restore a window from archive session (prompts for window index)
bind A command-prompt -p "Archive window index:" "move-window -s archive:%% -t :"

# Kill current window
bind w kill-window

# Navigate windows
bind - previous-window
bind = next-window

# Open new panes in the same directory as the current pane, rather than
# the home directory. " = horizontal split, % = vertical split.
bind h split-window -c "#{pane_current_path}"
bind v split-window -h -c "#{pane_current_path}"

###########################################################################
# Status bar

set -g status-style 'fg=white,bg=colour240'
set -g window-status-style 'fg=white,bg=colour240,bold'
set -g window-status-current-style 'fg=colour236,bg=colour252,bold'

###########################################################################
# Plugins

# To install plugins:  prefix + I
# To update plugins:   prefix + U
# To remove plugins:   prefix + alt + u  (removes unlisted plugins)

# TPM: Tmux Plugin Manager. Manages the plugins listed below.
set -g @plugin 'tmux-plugins/tpm'
# tmux-yank: Copies text to your system clipboard when you yank in copy mode.
# Also adds the shortcut `y` in copy mode to yank.
set -g @plugin 'tmux-plugins/tmux-yank'
# tmux-sensible: A set of "should-be-default" settings most people agree on.
set -g @plugin 'tmux-plugins/tmux-sensible'

# start the plugin manager, must be at bottom of conf file
run '~/.tmux/plugins/tpm/tpm'
